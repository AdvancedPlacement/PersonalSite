<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jason W's personal website.">
    <title>Jason W</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Added padding reset */
        }

        html,
        body {
            background: radial-gradient(ellipse at 50% 40%, #0f0f14 0%, #0a0a0c 100%);
            color: #e8e4dc;
            height: 100vh;
            overflow: hidden;
            font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
        }

        /* --- Navigation --- */
        #nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 48px;
            /* Defined height */
            display: flex;
            justify-content: center;
            /* Center the tabs */
            gap: 40px;
            background: rgba(10, 10, 12, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 200;
            /* Higher than orbs */
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font: 400 14px/48px "Helvetica Neue", Helvetica, Arial, sans-serif;
            /* Use UI font */
        }

        .nav-tab {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            transition: color 0.2s;
            cursor: pointer;
        }

        .nav-tab.active {
            color: #fff;
            font-weight: 600;
        }

        .nav-tab:not(.active):hover {
            color: #fff;
        }

        #stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            padding-top: 48px;
            /* Offset for nav bar */
        }

        /* --- Existing Elements (Z-index adjusted) --- */
        .line {
            position: absolute;
            white-space: pre;
            pointer-events: none;
            z-index: 1;
            color: #e8e4dc;
        }

        .headline-line {
            position: absolute;
            white-space: pre;
            pointer-events: none;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
            z-index: 2;
        }

        .drop-cap {
            position: absolute;
            pointer-events: none;
            z-index: 2;
            color: #c4a35a;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            /* Below Nav, above text */
            will-change: transform;
            transition: opacity 0.2s;
        }

        .orb.paused {
            opacity: 0.45;
        }

        .pullquote-box {
            position: absolute;
            pointer-events: none;
            z-index: 3;
            border-left: 3px solid #6b5a3d;
            padding-left: 14px;
        }

        .pullquote-line {
            position: absolute;
            white-space: pre;
            pointer-events: none;
            font-style: italic;
            color: #b8a070;
        }

        /* --- Stats Bar (Cleaned up) --- */
        #stats-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(6, 6, 10, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 24px;
            display: flex;
            gap: 32px;
            justify-content: flex-end;
            /* Align stats to right */
            font: 400 11px/1 "SF Mono", Menlo, monospace;
            /* Monospace for stats */
            color: rgba(255, 255, 255, 0.35);
            z-index: 100;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .stat {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .stat-value {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
        }

        .stat-label {
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Hint removed to clean up UI */
    </style>
</head>

<body>
    <nav id="nav-bar">
        <a href="index.html" class="nav-tab active">About Me</a>
        <a href="projects.html" class="nav-tab">Projects</a>
        <a href="contact.html" class="nav-tab">Contact</a>
    </nav>

    <div id="stage"></div>

    <div id="stats-bar">
        <div class="stat"><span id="sLines" class="stat-value">0</span><span class="stat-label">Lines</span></div>
        <div class="stat"><span id="sReflow" class="stat-value">0ms</span><span class="stat-label">Reflow</span></div>
        <div class="stat"><span id="sFps" class="stat-value">60</span><span class="stat-label">FPS</span></div>
        <div class="stat"><span id="sCols" class="stat-value">0</span><span class="stat-label">Cols</span></div>
    </div>

    <script type="module" src="./the-editorial-engine.js"></script>
</body>

</html>
